<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>クイズ・ザ・ミリオネア</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      body { background-color: #09090b; font-family: 'Rajdhani', sans-serif; margin: 0; }

      .font-display  { font-family: 'Bebas Neue', sans-serif; }
      .font-terminal { font-family: 'Share Tech Mono', 'Courier New', monospace; }
      .font-tactical { font-family: 'Rajdhani', sans-serif; font-weight: 700; }

      /* Metal text */
      .metal-text {
        background: linear-gradient(175deg, #fff 0%, #d8d8d8 25%, #fff 45%, #989898 65%, #e0e0e0 85%, #b0b0b0 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      /* Title flicker */
      @keyframes title-flicker {
        0%, 89%, 100% {
          filter: drop-shadow(0 0 12px rgba(220,38,38,0.9))
                  drop-shadow(0 0 30px rgba(220,38,38,0.5))
                  drop-shadow(0 4px 60px rgba(185,28,28,0.3));
        }
        90%, 92% { filter: drop-shadow(0 0 4px rgba(220,38,38,0.5)); }
        91%       { filter: drop-shadow(0 0 12px rgba(220,38,38,0.9)); }
      }
      .title-glow { animation: title-flicker 6s ease-in-out infinite; }

      /* Button shine */
      @keyframes shine {
        0%   { left: -100%; }
        100% { left: 200%; }
      }
      .btn-primary { position: relative; overflow: hidden; cursor: pointer; }
      .btn-primary::after {
        content: '';
        position: absolute; top: 0; bottom: 0;
        width: 40%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
        left: -100%;
        animation: shine 3s ease-in-out infinite;
      }

      /* Screen flash on reveal */
      @keyframes flash-fade {
        0%   { opacity: 1; }
        100% { opacity: 0; }
      }

      /* Countdown pulse rings */
      @keyframes countdown-pulse {
        0%, 100% { transform: scale(1); opacity: 0.6; }
        50%       { transform: scale(1.08); opacity: 0.2; }
      }

      /* Choice shimmer */
      @keyframes choice-shimmer {
        0%   { left: -100%; }
        100% { left: 200%; }
      }

      /* Blink cursor */
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0; }
      }

      /* Correct/incorrect flash */
      @keyframes reveal-correct {
        0%   { background: rgba(34,197,94,0.35); }
        100% { background: rgba(34,197,94,0.12); }
      }
      @keyframes reveal-incorrect {
        0%   { background: rgba(239,68,68,0.35); }
        100% { background: rgba(127,29,29,0.15); }
      }

      /* Choice button hover (not revealed) */
      .choice-btn-interactive:hover {
        border-color: rgba(220,38,38,0.8) !important;
        box-shadow: 0 0 20px rgba(220,38,38,0.35), inset 0 0 16px rgba(220,38,38,0.08) !important;
        transform: translateY(-1px);
      }

      /* Shooting star travel */
      @keyframes shooting-star-travel {
        0%   { opacity: 0;    transform: translate(0, 0); }
        12%  { opacity: 1; }
        88%  { opacity: 0.85; }
        100% { opacity: 0;    transform: translate(280px, 182px); }
      }

      /* Custom scrollbar */
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: #18181b; }
      ::-webkit-scrollbar-thumb { background: #7f1d1d; border-radius: 2px; }

      /* Border pulse for active */
      @keyframes border-pulse {
        0%, 100% { box-shadow: 0 0 0 0 rgba(220,38,38,0); border-color: rgba(185,28,28,0.6); }
        50%       { box-shadow: 0 0 20px 2px rgba(220,38,38,0.25); border-color: rgba(220,38,38,0.9); }
      }
      .final-btn-active { animation: border-pulse 1.8s ease-in-out infinite; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.jsx"></script>
  </body>
</html>
